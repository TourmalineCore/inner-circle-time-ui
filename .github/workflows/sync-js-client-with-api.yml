name: Sync js-client with api
on:
  repository_dispatch:
      # this workflow is triggered by an external script that calls the GitHub API
      # when a new version of the JS API client is released. Without this filter,
      # the workflow would run on every incoming dispatch event, not just this one.
    types:
      - trigger-js-client-sync-in-ui

jobs:
  sync-js-client-with-api:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          # we use personal access token to clone the repo and to commit later under the same account
          # this last pusher has to be different from the account that approves the pr
          # thus, it is a personal token that commits the change and github bot who approves it
          token: ${{ secrets.INNER_CIRCLE_TIME_UI_TRIGGER_TOKEN }}

      - name: Set branch name
        run: 
          echo "BRANCH_NAME=feature/sync-js-client-package-version-to-${{ github.event.client_payload.new_js_client_version }}-$(date +'%FT%H-%M')" >> $GITHUB_ENV

      # double quotes and new lines in multiline commit message breaks the sync workflow
      # using json to file trick that replaces double quotes and new lines with \" and \n
      # -e is used to enable interpretation of the following backslash escapes (e.g \n)
      - name: Write commit message to file
        run: 
          echo -e ${{ toJson(github.event.client_payload.commit_message) }} > commit_message.txt

      - name: Install new js-client version  
        run: npm install @tourmalinecore/inner-circle-time-api-js-client@${{ github.event.client_payload.new_js_client_version }} --save

      - name: Commit and Push Changes
        run: |
          git config user.email "contact@tourmalinecore.com"
          
          git config user.name "Workflow Action"

          git checkout -b $BRANCH_NAME master

          git add package.json package-lock.json

          git commit -F commit_message.txt
          
          git push origin $BRANCH_NAME

      - name: Set PR title
        run: 'echo "PR_TITLE=infra: update js-client to ${{ github.event.client_payload.new_js_client_version }}" >> $GITHUB_ENV' 
        
      - name: Create PR
        run: gh pr create -B master -H $BRANCH_NAME --title "${{ env.PR_TITLE }}" -F commit_message.txt
        env:
          GITHUB_TOKEN: ${{ secrets.INNER_CIRCLE_TIME_UI_TRIGGER_TOKEN }}

      - name: Approve PR
        run: gh pr review $BRANCH_NAME -a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for PR
        run: gh pr merge $BRANCH_NAME --auto --squash --subject "${{ env.PR_TITLE }}" -F commit_message.txt
        env:
          GITHUB_TOKEN: ${{ secrets.INNER_CIRCLE_TIME_UI_TRIGGER_TOKEN }}
